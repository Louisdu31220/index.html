<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Secret Agent Mission</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle, #111, #000);
    color: white;
    text-align: center;
}

/* Header */
header {
    padding: 30px;
    border-bottom: 2px solid gold;
}

h1 {
    color: gold;
    letter-spacing: 4px;
    font-size: 32px;
}

/* Agent name */
.agent {
    color: #bbb;
    font-size: 18px;
    margin-top: 5px;
}

/* Card */
.card {
    margin: 40px auto;
    width: 80%;
    padding: 25px;
    background: rgba(255,255,255,0.05);
    border: 1px solid gold;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(255,215,0,0.2);
}

/* Button */
button {
    margin-top: 20px;
    padding: 15px 30px;
    font-size: 16px;
    background: gold;
    border: none;
    cursor: pointer;
    font-weight: bold;
    border-radius: 10px;
}

button:hover {
    background: white;
    color: black;
}

/* Final message */
#complete {
    display: none;
    margin-top: 30px;
    font-size: 28px;
    color: lightgreen;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
<h1>SECRET MISSION FILE</h1>
<div class="agent">Agent NOVA</div>
</header>

<div class="card">
    <h2>Mission Control</h2>
    <p>Press the button only when your mission is finished.</p>

    <button onclick="done()">MISSION COMPLETE</button>

    <div id="complete">
        ✔ MISSION TERMINATED SUCCESSFULLY
    </div>
</div>

<script>
function done() {
    document.getElementById("complete").style.display = "block";
}
</script>

</body>
</html>
